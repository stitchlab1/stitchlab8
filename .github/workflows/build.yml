name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          java-package: jdk

      - name: Accept Android Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo -e "\n504667f4c0e7b10469032729a674116035f1118a" > "$ANDROID_HOME/licenses/android-sdk-preview-license"

      - name: Build and Permissions
        run: |
          cd android
          # تنظيف بيئة Gradle من أي ملفات تالفة أو غير متوافقة
          rm -rf .gradle
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # إعادة إنشاء Wrapper نظيف من خوادم Gradle
          gradle wrapper --gradle-version 8.2
          
          # منح أذونات التنفيذ للملفات
          chmod +x gradlew
          
          # تنفيذ عملية البناء
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
