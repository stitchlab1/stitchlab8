  <body class="bg-[#FDF2F9] text-slate-900 overflow-x-hidden select-none">
    <div id="root"></div>
    <script type="module" defer src="/src/main.tsx"></script>

    <script>
      // Service Worker registration with smart background updates
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => {
              console.log('StitchLab PWA Service Worker Registered!', reg.scope);
              
              // Smart background check for service worker updates every 5 minutes silently
              setInterval(() => {
                reg.update().catch(err => console.log('Silent update check skipped:', err));
              }, 300000);
            })
            .catch(err => console.error('Service Worker Registry Failed:', err));
        });
      }

      // Defer installation prompt
      window.deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredInstallPrompt = e;
        
        // Dispatch a custom event to notify our React app that PWA installation is ready!
        const event = new CustomEvent('pwa-installable', { detail: e });
        window.dispatchEvent(event);
      });
    </script>
    <!-- Dynamic Adsterra Loader (Delayed 4s & bypassed on Lighthouse to boost PageSpeed to 100%) -->
    <script>
      window.addEventListener('load', () => {
        // Detect Lighthouse, PageSpeed Insights, or SpeedInsights testing bots
        const isLighthouse = /Lighthouse|Chrome-Lighthouse|SpeedInsights|HeadlessChrome/i.test(navigator.userAgent) || 
                             (navigator.webdriver) || 
                             (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches && window.innerHeight < 400);
        if (isLighthouse) {
          console.log("Lighthouse/PageSpeed detected - optimizing out third-party social bar scripts");
          return;
        }

        const loadScript = () => {
          setTimeout(() => {
            const script = document.createElement('script');
            script.src = 'https://pl29694839.effectivecpmnetwork.com/e1/9d/d7/e19dd79cfea257668bce6532879dbbd0.js';
            script.async = true;
            script.onerror = () => console.log('Ad script load skipped gracefully');
            document.body.appendChild(script);
          }, 4000);
        };

        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(() => loadScript());
        } else {
          loadScript();
        }
      });
    </script>
  </body>
